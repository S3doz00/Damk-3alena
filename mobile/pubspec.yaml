name: damk_3alena
description: "Damk 3alena - AI-Driven Blood Donation App for Jordan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.9.0

  # Routing
  go_router: ^14.8.1

  # State Management
  provider: ^6.1.5

  # Maps & Location
  google_maps_flutter: ^2.12.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI Components
  table_calendar: ^3.2.0
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Fonts loaded via google_fonts package (no bundled assets needed)
