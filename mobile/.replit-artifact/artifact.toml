kind = "mobile"
previewPath = "/"
title = "Damk 3alena - Blood Donation"
version = "1.0.0"
id = "artifacts/damk-3alena"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22466

[services.development]
run = "pnpm --filter @workspace/damk-3alena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/damk-3alena", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/damk-3alena", "run", "serve" ]

[services.env]
PORT = "22466"
BASE_PATH = "/"
